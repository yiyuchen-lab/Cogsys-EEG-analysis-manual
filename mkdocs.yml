site_name: CogSys EEG Analysis Manual
site_description: Internal EEG analysis and preprocessing manual for the CogSys lab
site_author: Yiyu Chen
site_url: https://yiyuchen-lab.github.io/Cogsys-EEG-analysis-manual/

repo_name: yiyuchen-lab/Cogsys-EEG-analysis-manual
repo_url: https://github.com/yiyuchen-lab/Cogsys-EEG-analysis-manual

copyright: Copyright &copy; Yiyu Chen

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: deep orange
      accent: orange
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Start Here:
      - Overview: start-here/index.md
      - Learning Path: start-here/learning-path.md
      - Software Setup: start-here/software-setup.md
      - First EEG Practice: start-here/first-practice.md
  - Tutorials:
      - Overview: tutorials/index.md
      - EEGBCI Eyes Open vs Eyes Closed: tutorials/eegbci-eyes-open-closed.md
  - SOPs:
      - Overview: sops/index.md
      - BrainAmp Setup: sops/brainamp-setup.md
      - Cap Preparation: sops/cap-preparation.md
      - Impedance Check: sops/impedance-check.md
      - Marker Verification: sops/trigger-test.md
      - Session Files: sops/session-files.md
  - Preprocessing:
      - Overview: preprocessing/index.md
  - Reference:
      - Overview: reference/index.md
  - Troubleshooting:
      - Overview: troubleshooting/index.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
